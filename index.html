<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | mouth room</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    /* ======= 全局重置 ======= */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #000;
    }

    /* ======= 桌機版預設排版 ======= */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    #page-wrap {
      width: 100%;
    }

    #unity-container {
      position: relative;
      width: 960px;
      height: 600px;
      max-width: 100%;
      aspect-ratio: 960 / 600;
      margin: 0 auto;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ======= 手機與平板 (無論直向或橫向) ======= */
    @media (max-width: 1024px) {
      
      html, body {
        overflow-y: auto !important; /* 1. 絕對保證可以上下滑動 */
        height: auto !important;
        display: block !important;   /* 取消 body flex，防止蘋果手機亂縮放 */
      }

      #page-wrap {
        display: block;
        padding: 40px 0; /* 2. 上下留出黑邊，證明它不是滿版全螢幕 */
      }

      /* 3. 最關鍵：強制覆蓋 Unity 自動加上的全螢幕死鎖屬性 */
      #unity-container, .unity-mobile {
        position: relative !important;
        top: 0 !important;
        left: 0 !important;
        transform: none !important;
        
        /* 4. 控制大小：寬度佔螢幕 90%，高度自動鎖死 16:10 比例 */
        width: 78vw !important; 
        height: auto !important;
        aspect-ratio: 960 / 600 !important; 
        margin: 0 auto !important; /* 確保遊戲在正中間 */
      }

      #unity-canvas {
        /* 5. 防裁切：絕對定位填滿容器，絕不變形 */
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }

      #unity-footer {
        display: none !important; /* 手機版直接隱藏底條，避免干擾畫面 */
      }
    }
  </style>
</head>

<body>
  <div id="page-wrap">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">mouth room</div>
      </div>
    </div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      var div = document.createElement("div");
      div.innerHTML = msg;
      div.style.padding = "10px";
      div.style.marginBottom = "8px";
      div.style.borderRadius = "8px";
      div.style.textAlign = "center";
      div.style.fontSize = "14px";

      if (type === "error") {
        div.style.background = "red";
        div.style.color = "white";
      } else {
        div.style.background = "yellow";
        div.style.color = "black";
        setTimeout(function () {
          if (warningBanner.contains(div)) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      warningBanner.appendChild(div);
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/ka_build.loader.js";

    var config = {
      dataUrl: buildUrl + "/ka_build.data.unityweb",
      frameworkUrl: buildUrl + "/ka_build.framework.js.unityweb",
      codeUrl: buildUrl + "/ka_build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "mouth room",
      productVersion: "0.1",
      showBanner: unityShowBanner
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      
      config.devicePixelRatio = 1;
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";

        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
        };

        setTimeout(() => window.dispatchEvent(new Event("resize")), 300);
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
