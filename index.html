<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | mouth room</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      overflow-y: auto; /* 保留上下滑動 */
      -webkit-overflow-scrolling: touch;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 不鎖死置中，保留頁面往下滑空間 */
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, sans-serif;
      background: #000;
    }

    /* 外層包一層，方便手機直向時仍可往下滑 */
    #page-wrap {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      box-sizing: border-box;
      background: #000;
    }

    #unity-container {
      position: relative;
      width: min(100vw, calc(100dvh * 1.6));
      aspect-ratio: 960 / 600;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      margin: 0 auto;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      touch-action: manipulation; /* 允許正常觸控，不鎖死整頁滾動 */
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 20;
      width: min(80%, 400px);
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      z-index: 30;
      width: calc(100% - 20px);
      max-width: 600px;
    }

    #unity-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
    }

    /* 桌機 */
    @media (min-width: 1025px) {
      #page-wrap {
        min-height: 100vh;
        align-items: center;
      }

      #unity-container {
        width: min(100vw, calc(100vh * 1.6));
        max-width: 100vw;
        max-height: 100vh;
      }
    }

    /* 手機 / 平板 */
    @media (max-width: 1024px) {
      #page-wrap {
        min-height: 100dvh;
      }
    }

    /* 手機直向：維持比例、不裁切、可上下滑 */
    @media (orientation: portrait) and (max-width: 1024px) {
      body {
        align-items: flex-start;
      }

      #page-wrap {
        align-items: flex-start;
        padding-top: max(12px, env(safe-area-inset-top));
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }

      #unity-container {
        width: 100vw;
        height: calc(100vw / 1.6);
        max-height: none;
      }
    }

    /* 手機橫向：盡量吃滿畫面，但維持比例 */
    @media (orientation: landscape) and (max-width: 1024px) {
      body {
        align-items: center;
      }

      #page-wrap {
        align-items: center;
        min-height: 100dvh;
        padding-top: 0;
        padding-bottom: 0;
      }

      #unity-container {
        width: min(100vw, calc(100dvh * 1.6));
        height: min(100dvh, calc(100vw / 1.6));
      }
    }
  </style>
</head>

<body>
  <div id="page-wrap">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">mouth room</div>
      </div>
    </div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      var div = document.createElement("div");
      div.innerHTML = msg;
      div.style.padding = "10px";
      div.style.marginBottom = "8px";
      div.style.borderRadius = "8px";
      div.style.textAlign = "center";
      div.style.fontSize = "14px";

      if (type === "error") {
        div.style.background = "red";
        div.style.color = "white";
      } else {
        div.style.background = "yellow";
        div.style.color = "black";
        setTimeout(function () {
          if (warningBanner.contains(div)) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      warningBanner.appendChild(div);
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/ka_build.loader.js";

    var config = {
      dataUrl: buildUrl + "/ka_build.data.unityweb",
      frameworkUrl: buildUrl + "/ka_build.framework.js.unityweb",
      codeUrl: buildUrl + "/ka_build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "mouth room",
      productVersion: "0.1",
      showBanner: unityShowBanner
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
      config.devicePixelRatio = 1;
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";

        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
        };

        // 某些手機旋轉後 canvas 不會立刻刷新，補一次 resize
        setTimeout(() => window.dispatchEvent(new Event("resize")), 300);
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
