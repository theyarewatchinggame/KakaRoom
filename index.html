<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | mouth room</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #page-wrap {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      box-sizing: border-box;
      background: #000;
    }

    #unity-container {
      position: relative;
      width: min(calc(100vw - 40px), calc((100dvh - 40px) * 1.6));
      height: min(calc(100dvh - 40px), calc((100vw - 40px) / 1.6));
      aspect-ratio: 960 / 600;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      margin: 0 auto;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      touch-action: manipulation;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 20;
      width: min(80%, 400px);
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      z-index: 30;
      width: calc(100% - 20px);
      max-width: 600px;
    }

    #unity-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
    }

    /* 桌機 */
    @media (min-width: 1025px) {
      #page-wrap {
        min-height: 100vh;
        align-items: center;
      }

      #unity-container {
        width: min(calc(100vw - 40px), calc((100vh - 40px) * 1.6));
        height: min(calc(100vh - 40px), calc((100vw - 40px) / 1.6));
        max-width: calc(100vw - 40px);
        max-height: calc(100vh - 40px);
      }
    }

    /* 手機 / 平板 */
    @media (max-width: 1024px) {
      #page-wrap {
        min-height: 100dvh;
      }
    }

    /* 手機直向：維持比例、不裁切、可上下滑 */
    @media (orientation: portrait) and (max-width: 1024px) {
      body {
        align-items: flex-start;
      }

      #page-wrap {
        align-items: flex-start;
        padding-top: max(12px, env(safe-area-inset-top));
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }

      #unity-container {
        width: calc(100vw - 24px);
        height: calc((100vw - 24px) / 1.6);
        max-height: none;
      }
    }

   /* 手機橫向：修正滑動與比例 */
    @media (orientation: landscape) and (max-width: 1024px) {
      body {
        align-items: flex-start; 
        overflow-y: auto !important; /* 強制開啟捲軸 */
      }

      #page-wrap {
        /* 1. 這裡改為 flex-start 是能滑動的關鍵 */
        align-items: flex-start; 
        /* 2. 取消 min-height 固定死 100dvh 的限制，讓它可以被內容撐開 */
        height: auto;
        min-height: 100dvh; 
        padding: 20px 0; /* 給上下留點黑邊，不要貼死邊緣 */
      }

      #unity-container {
        /* 3. 調整比例：寬度不要撐滿，高度限制在螢幕 80% 以內避免全螢幕感 */
        width: min(90vw, calc((80vh) * 1.6)); 
        height: auto;
        aspect-ratio: 960 / 600;
        max-height: 80vh; 
        margin: 0 auto; /* 置中容器 */
      }
      
      #unity-footer {
        /* 橫向時 Footer 建議改回 relative，不然會蓋在遊戲畫面上 */
        position: relative;
        margin-top: 10px;
      }
    }
  </style>
</head>

<body>
  <div id="page-wrap">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">mouth room</div>
      </div>
    </div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      var div = document.createElement("div");
      div.innerHTML = msg;
      div.style.padding = "10px";
      div.style.marginBottom = "8px";
      div.style.borderRadius = "8px";
      div.style.textAlign = "center";
      div.style.fontSize = "14px";

      if (type === "error") {
        div.style.background = "red";
        div.style.color = "white";
      } else {
        div.style.background = "yellow";
        div.style.color = "black";
        setTimeout(function () {
          if (warningBanner.contains(div)) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      warningBanner.appendChild(div);
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/ka_build.loader.js";

    var config = {
      dataUrl: buildUrl + "/ka_build.data.unityweb",
      frameworkUrl: buildUrl + "/ka_build.framework.js.unityweb",
      codeUrl: buildUrl + "/ka_build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "mouth room",
      productVersion: "0.1",
      showBanner: unityShowBanner
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
      config.devicePixelRatio = 1;
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";

        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
        };

        setTimeout(() => window.dispatchEvent(new Event("resize")), 300);
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
