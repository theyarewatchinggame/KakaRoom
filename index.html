<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | mouth room</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #page-wrap {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      box-sizing: border-box;
      background: #000;
    }

    #unity-container {
      position: relative;
      width: min(calc(100vw - 40px), calc((100dvh - 40px) * 1.6));
      height: min(calc(100dvh - 40px), calc((100vw - 40px) / 1.6));
      aspect-ratio: 960 / 600;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      margin: 0 auto;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      touch-action: manipulation;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 20;
      width: min(80%, 400px);
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      z-index: 30;
      width: calc(100% - 20px);
      max-width: 600px;
    }

    #unity-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
    }

    /* 桌機 */
    @media (min-width: 1025px) {
      #page-wrap {
        min-height: 100vh;
        align-items: center;
      }

      #unity-container {
        width: min(calc(100vw - 40px), calc((100vh - 40px) * 1.6));
        height: min(calc(100vh - 40px), calc((100vw - 40px) / 1.6));
        max-width: calc(100vw - 40px);
        max-height: calc(100vh - 40px);
      }
    }

    /* 手機 / 平板 */
    @media (max-width: 1024px) {
      #page-wrap {
        min-height: 100dvh;
      }
    }

    /* ======= 手機直向媒體查詢 (Orientation: Portrait) ======= */
  @media (orientation: portrait) and (max-width: 1024px) {
    html, body {
      overflow-y: auto !important; /* 保留垂直捲軸 */
      height: auto !important;
    }

    #page-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 20px 0; /* 上下留黑邊 */
    }

    #unity-container {
      width: calc(100vw - 40px) !important;
      /* 關鍵：精確計算寬高，限制最大高度在 70dvh */
      height: min(calc((100vw - 40px) / 1.6), 70dvh) !important;
      aspect-ratio: 960 / 600 !important;
      margin: 0 auto;
      max-height: none !important;
      position: relative;
      background: #000;
      display: flex; /* 保證內容在容器內置中 */
      justify-content: center;
      align-items: center;
    }

    #unity-canvas {
      /* 關鍵：強制防裁切，貼合容器 */
      width: 100% !important;
      height: 100% !important;
      object-fit: contain; /* 確保內容按比例縮放不變形 */
    }
  }

  /* ======= 手機橫向媒體查詢 (Orientation: Landscape) ======= */
  @media (orientation: landscape) and (max-width: 1024px) {
    html, body {
      overflow-y: auto !important; /* 強制開啟垂直捲軸 */
      height: auto !important;
    }

    #page-wrap {
      display: flex; /* 使用 flex 置中遊戲 */
      justify-content: center;
      align-items: center; /* 置中 */
      min-height: 100dvh; /* 佔滿螢幕 */
      padding: 20px; /* 給上下左右留點黑邊 */
      box-sizing: border-box;
      background: #000;
    }

    #unity-container {
      /* 核心調整：精確計算寬高限制最大高度，不滿版、防裁切 */
      /* 1. 寬度：限制在 90vw 和 (螢幕高度 90dvh * 比例 1.6) 之間取小 */
      width: min(90vw, calc(90dvh * 1.6)) !important;
      /* 2. 高度：限制在螢幕高度 90dvh 和 (90vw / 比例 1.6) 之間取小 */
      height: min(calc(90vw / 1.6), 90dvh) !important;
      
      aspect-ratio: 960 / 600 !important; /* 鎖死 16:10 比例 */
      max-width: none !important;
      max-height: none !important;
      margin: 0 auto; /* 水平置中 */
      position: relative;
      background: #000;
      display: flex; /* 保證內容在容器內置中 */
      justify-content: center;
      align-items: center;
    }

    #unity-canvas {
      /* 核心調整：強制防裁切，貼合容器 */
      width: 100% !important;
      height: 100% !important;
      object-fit: contain; /* 確保內容按比例縮放 */
    }
    
    #unity-footer {
      /* 建議：橫向時 Footer 改為 relative，置於容器下方 */
      position: relative;
      margin-top: 15px;
      text-align: center;
      width: 100%;
    }
  }
</style>
</head>

<body>
  <div id="page-wrap">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">mouth room</div>
      </div>
    </div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      var div = document.createElement("div");
      div.innerHTML = msg;
      div.style.padding = "10px";
      div.style.marginBottom = "8px";
      div.style.borderRadius = "8px";
      div.style.textAlign = "center";
      div.style.fontSize = "14px";

      if (type === "error") {
        div.style.background = "red";
        div.style.color = "white";
      } else {
        div.style.background = "yellow";
        div.style.color = "black";
        setTimeout(function () {
          if (warningBanner.contains(div)) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      warningBanner.appendChild(div);
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/ka_build.loader.js";

    var config = {
      dataUrl: buildUrl + "/ka_build.data.unityweb",
      frameworkUrl: buildUrl + "/ka_build.framework.js.unityweb",
      codeUrl: buildUrl + "/ka_build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "mouth room",
      productVersion: "0.1",
      showBanner: unityShowBanner
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      
      config.devicePixelRatio = 1;
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";

        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
        };

        setTimeout(() => window.dispatchEvent(new Event("resize")), 300);
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
