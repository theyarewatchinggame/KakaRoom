<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | mouth room</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: auto;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, sans-serif;
    }

    #unity-container {
      position: relative;
      width: min(100vw, calc(100dvh * 1.6));
      aspect-ratio: 960 / 600;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 20;
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      z-index: 30;
      width: calc(100% - 20px);
      max-width: 600px;
    }

    #unity-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
    }

    /* 手機橫向最佳化 */
    @media (max-width: 1024px) {
      body {
        padding: 0;
      }

      #unity-container {
        width: 100vw;
        max-width: 100vw;
        aspect-ratio: 960 / 600;
      }
    }

    /* 手機直向時仍顯示完整畫面，維持比例，不裁切 */
    @media (orientation: portrait) and (max-width: 1024px) {
      #unity-container {
        width: 100vw;
        height: calc(100vw / 1.6);
        max-height: 100dvh;
      }
    }

    /* 手機橫向時盡量吃滿高度，但不變形 */
    @media (orientation: landscape) and (max-width: 1024px) {
      #unity-container {
        height: 100dvh;
        width: calc(100dvh * 1.6);
        max-width: 100vw;
        max-height: calc(100vw / 1.6);
      }
    }
  </style>
</head>
<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>

    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">mouth room</div>
    </div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      var div = document.createElement("div");
      div.innerHTML = msg;
      div.style.padding = "10px";
      div.style.marginBottom = "8px";
      div.style.borderRadius = "8px";
      div.style.textAlign = "center";
      div.style.fontSize = "14px";

      if (type == "error") {
        div.style.background = "red";
        div.style.color = "white";
      } else {
        div.style.background = "yellow";
        div.style.color = "black";
        setTimeout(function () {
          if (warningBanner.contains(div)) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      warningBanner.appendChild(div);
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/ka_build.loader.js";

    var config = {
      dataUrl: buildUrl + "/ka_build.data.unityweb",
      frameworkUrl: buildUrl + "/ka_build.framework.js.unityweb",
      codeUrl: buildUrl + "/ka_build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "mouth room",
      productVersion: "0.1",
      showBanner: unityShowBanner
    };

    // 手機稍微降解析度，比較穩
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
      config.devicePixelRatio = 1;
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";

        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
        };
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
